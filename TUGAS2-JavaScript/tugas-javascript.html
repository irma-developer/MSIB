<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tugas 2 – JavaScript: Data Pegawai</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; background:#f7f7fb; padding:24px; }
    h1 { margin:0 0 16px; }
    table { width:100%; max-width:760px; border-collapse: collapse; background:#fff; box-shadow: 0 4px 16px rgba(0,0,0,.06); }
    thead th { background:#111827; color:#fff; text-align:left; padding:12px; }
    tbody td, tfoot td { border-top:1px solid #e5e7eb; padding:10px 12px; }
    tfoot td { font-weight:700; background:#fafafa; }
    .right { text-align:right; }
    .muted { color:#6b7280; font-weight:400; }
  </style>
</head>
<body>

<h1>Data Pegawai</h1>

<table aria-label="Tabel Data Pegawai">
  <thead>
    <tr>
      <th>Nama Pegawai</th>
      <th>Umur</th>
      <th>Jabatan</th>
      <th>Status</th>
      <th class="right">Gaji Pokok</th>
      <th class="right">Tunj. Jabatan (15%)</th>
      <th class="right">BPJS (10%)</th>
      <th class="right">Tunj. Keluarga <span class="muted">(status menikah, 20%)</span></th>
    </tr>
  </thead>
  <tbody id="tbody-pegawai"></tbody>
  <tfoot>
    <tr>
      <td colspan="7" class="right">Total Gaji</td>
      <td class="right" id="total-gaji"></td>
    </tr>
  </tfoot>
</table>

<script>
  // ====== DATA (boleh kamu ganti/duplikasi untuk uji coba lain) ======
  const pegawai = {
    nama: "Dodi Prayodi",
    umur: 25,
    jabatan: "asisten manajer",   // manajer | asisten manajer | staff
    status: "belum menikah"     // menikah | belum menikah
  };

    // FORMAT RUPIAH 
  const rupiah = n => new Intl.NumberFormat('id-ID', {
    style: 'currency', currency: 'IDR', maximumFractionDigits: 0
  }).format(n);

  //  LOGIKA GAJI 
  // Gaji pokok menggunakan if 
  function hitungGapok(jabatan) {
    const j = (jabatan || "").toLowerCase().trim();
    if (j === "manajer") return 15_000_000;
    else if (j === "asisten manajer" || j === "asisten-manajer") return 10_000_000;
    else if (j === "staff" || j === "staf") return 5_000_000;
    // default (kalau jabatan tidak dikenali)
    return 0;
  }

  function renderTabel(p) {
    const gapok = hitungGapok(p.jabatan);
    const tunjJabatan = 0.15 * gapok;       // 15% dari gapok
    const bpjs = 0.10 * gapok;              // 10% dari gapok
    // Tunjangan keluarga pakai ternary 
    const tunjKeluarga = (p.status.toLowerCase() === "menikah") ? 0.20 * gapok : 0;

    const totalGaji = gapok + tunjJabatan + tunjKeluarga + bpjs;

    const row = `
      <tr>
        <td>${capitalize(p.nama)}</td>
        <td>${p.umur} tahun</td>
        <td>${capitalize(p.jabatan)}</td>
        <td>${capitalize(p.status)}</td>
        <td class="right">${rupiah(gapok)}</td>
        <td class="right">${rupiah(tunjJabatan)}</td>
        <td class="right">${rupiah(bpjs)}</td>
        <td class="right">${rupiah(tunjKeluarga)}</td>
      </tr>
    `;
    document.getElementById('tbody-pegawai').innerHTML = row;
    document.getElementById('total-gaji').textContent = rupiah(totalGaji);
  }

  function capitalize(text) {
    return (text || "").split(" ").map(s => s.charAt(0).toUpperCase() + s.slice(1)).join(" ");
  }

  // Render saat halaman dimuat
  renderTabel(pegawai);
</script>

</body>
</html>
